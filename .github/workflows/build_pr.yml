name: "Build PR"
on:
  pull_request:
    branches: [ main*, feat/*, hotfix/* ]

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}-build-pr
  cancel-in-progress: true

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      - name: Compile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        run: mvn -B -U -ntp test-compile -Dmaven.compiler.proc=full

      - name: Package compiled output
        run: tar -czf compiled.tar.gz target/classes target/test-classes

      - name: Upload compiled output
        uses: actions/upload-artifact@v7
        with:
          name: compiled
          path: compiled.tar.gz
          retention-days: 7

  test:
    name: Test (${{ matrix.group }})
    needs: compile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [non-integration, integration-core, integration-service-1, integration-service-2]
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      - name: Download compiled output
        uses: actions/download-artifact@v8
        with:
          name: compiled

      - name: Extract compiled output
        run: tar -xzf compiled.tar.gz

      - name: Run ${{ matrix.group }} tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        run: mvn -B -U -ntp test -Ptest-${{ matrix.group }} -Dmaven.compiler.skip=true

      - name: Upload coverage exec
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-exec-${{ matrix.group }}
          path: target/jacoco.exec
          retention-days: 7

  package:
    name: Package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      - name: Download compiled output
        uses: actions/download-artifact@v8
        with:
          name: compiled

      - name: Extract compiled output
        run: tar -xzf compiled.tar.gz

      - name: Download non-integration coverage exec
        uses: actions/download-artifact@v8
        with:
          name: jacoco-exec-non-integration
          path: jacoco-partial/group1

      - name: Download integration-core coverage exec
        uses: actions/download-artifact@v8
        with:
          name: jacoco-exec-integration-core
          path: jacoco-partial/group2

      - name: Download integration-service-1 coverage exec
        uses: actions/download-artifact@v8
        with:
          name: jacoco-exec-integration-service-1
          path: jacoco-partial/group3

      - name: Download integration-service-2 coverage exec
        uses: actions/download-artifact@v8
        with:
          name: jacoco-exec-integration-service-2
          path: jacoco-partial/group4

      - name: Rename partial exec files for merge
        run: |
          mv jacoco-partial/group1/jacoco.exec jacoco-partial/jacoco-non-integration.exec
          mv jacoco-partial/group2/jacoco.exec jacoco-partial/jacoco-integration-core.exec
          mv jacoco-partial/group3/jacoco.exec jacoco-partial/jacoco-integration-service-1.exec
          mv jacoco-partial/group4/jacoco.exec jacoco-partial/jacoco-integration-service-2.exec

      - name: Merge coverage, generate report, and package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        run: mvn -B -U -ntp package -DskipTests -Pmerge-coverage -Dmaven.compiler.skip=true

      # Write PR number to file
      - name: Write PR number to file
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      # Upload PR number artifact
      - name: Upload PR number artifact
        uses: actions/upload-artifact@v7
        with:
          name: pr-number
          path: pr-number.txt

      # Upload compiled classes
      - name: Upload Compiled Classes
        uses: actions/upload-artifact@v7
        with:
          name: compiled-classes
          path: target/classes

      # Upload Jacoco XML report(s)
      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: target/site/jacoco/jacoco.xml

  build:
    name: Build
    needs: package
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build complete"
