app:
  version: '@project.version@'

caching:
  authentication:
    ttl-minutes: 5
    max-size: 500
  connectors:
    ttl-minutes: 5
    max-size: 100
  cert-chains:
    ttl-minutes: 5
    max-size: 1000
  signing-certs:
    ttl-minutes: 5
    max-size: 1000
  crypto-keys:
    ttl-minutes: 5
    max-size: 10000
  tsp-profiles:
    ttl-minutes: 5
    max-size: 100
  signing-profiles:
    ttl-minutes: 5
    max-size: 100
  time-quality-configs:
    ttl-minutes: 5
    max-size: 100

auth-service:
  base-url: http://authservice.dev
opa:
  base-url: http://opa.dev

cmp:
  protocol:
    poll:
      feature:
        timeout: 10
  verbose: true

hibernate:
  types:
    print:
      banner: false

logging:
  level:
    org:
      hibernate: warn
    com.otilm: debug
  pattern:
    console: '[%d{yyyy-MM-dd HH:mm:ss.SSS}] %-5level [%t] [%logger - %line]: %m%n'
  schema-version: '@log-schema.version@'

scheduled-tasks:
  enabled: false

scheduler:
  base-url: http://localhost:8080

signing-record:
  outbox:
    flush-interval-ms: 500
    max-batch-size: 200
    max-batches-per-run: 10
    poison-threshold: 10
  best-effort:
    queue-capacity: 10000
    backpressure-policy: DROP_OLDEST
    flush-interval-ms: 200
    max-batch-size: 200
  retention:
    sweep-interval-minutes: 60
    batch-size: 1000
    max-batches-per-sweep: 10
  delete-after-retrieval:
    fallback-cron: 0 0 3 * * *
    batch-size: 1000
    max-batches-per-sweep: 10

secrets:
  encryption:
    key: test123

server:
  port: 8082
  servlet:
    context-path: /api
  ssl:
    certificate-header-name: ${HEADER_NAME:X-APP-CERTIFICATE}
    enabled: false

spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      minimum-idle: 1
      maximumPoolSize: 10
      connection-timeout: 10000
      idle-timeout: 30000
      max-lifetime: 60000
    url: jdbc:tc:postgresql:17-alpine://localhost:55432/czertainly-test?currentSchema=core&TC_TMPFS=/testtmpfs:rw&TC_DAEMON=true
    password: test
    username: test
  flyway:
    enabled: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        type:
          preferred_duration_jdbc_type: INTERVAL_SECOND
        default_schema: core
  profiles:
    active: test
  session:
    jdbc:
      initialize-schema: never
  threads:
    virtual:
      enabled: true
  sql:
    init:
      mode: always
  messaging:
    broker-type: RABBITMQ
    broker-url: amqp://localhost:5672
    username: guest
    password: guest
    amqp-idle-timeout: 120000
    close-timeout: 5000
    pool:
      max-connections: 1
      connection-idle-timeout: 30000
      connection-check-interval: -1
      max-sessions-per-connection: 5
      use-anonymous-producers: true
    queue:
      actions: core.actions
      audit-logs: core.audit-logs
      event: core.events
      notification: core.notifications
      scheduler: core.scheduler
      validation: core.validation
      time-quality-config-request: time-quality.config-request
      time-quality-config: time-quality.config
      time-quality-results: time-quality.results
    listener:
      initial-interval: 1000
      multiplier: 1.5
      max-interval: 5000
    exchange: platform
    routing-key:
      actions: action
      audit-logs: audit-logs
      event: event
      notification: notification
      scheduler: scheduler
      validation: validation
      time-quality-config-request: time-quality.config-request
      time-quality-config: time-quality.config
      time-quality-results: time-quality.results
    producer:
      retry:
        enabled: true
        initial-interval: 200
        max-attempts: 3
        max-interval: 2000
        multiplier: 2
messaging:
  time-quality:
    enabled: true
  concurrency:
    actions: 10
    events: 5
    notifications: 3
    scheduler: 10
    validation: 5
    audit-logs: 5
    time-quality-config-request: 1
    time-quality-results: 1

otel:
  instrumentation:
    enabled: false
  sdk:
    disabled: true

settings:
  cache:
    # Effectively disable the scheduled cache refresh during tests so that
    # in-memory cache values populated by @BeforeEach are not wiped mid-test.
    refresh-interval: 31536000

validation:
  ocsp:
    # Must be longer than the WireMock fixed delay used in RevokeDuringComplianceCheckTest
    # (3 s) so the OCSP HTTP call waits for WireMock's response instead of timing out at the
    # 1 s default. The held OCSP call is what keeps validate()'s would-be row lock observable.
    read-timeout: 5000
    connect-timeout: 5000

proxy:
  enabled: true
  instance-id: test-instance

provisioning:
  api:
    url: http://localhost:8080
    api-key: test-api-key
    connect-timeout: 500
    read-timeout: 1s
    installation-format: helm
    retry:
      max-attempts: 2
      delay: 500
      max-delay: 1000
      multiplier: 2
