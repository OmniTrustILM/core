app:
  version: '@project.version@'


caching:
  # Authentication cache caches resolved user identities to avoid repeated auth-service lookups
  authentication:
    ttl-minutes: ${AUTH_CACHE_TTL_MINUTES:5}   # How long a cached identity is considered valid
    max-size: ${AUTH_CACHE_MAX_SIZE:500}       # Maximum number of cached identities
  # Connector API-client cache caches ApiClientConnectorInfo per connector UUID to avoid repeated database accesses.
  connectors:
    ttl-minutes: ${CONNECTORS_CACHE_TTL_MINUTES:5}
    max-size: ${CONNECTORS_CACHE_MAX_SIZE:100}
  # Certificate-chain cache avoids repeated recursive-CTE lookups on the signing hot path.
  cert-chains:
    ttl-minutes: ${CERT_CHAINS_CACHE_TTL_MINUTES:5}
    max-size: ${CERT_CHAINS_CACHE_MAX_SIZE:1000}
  # Signing-certificate cache holds certificate data + structural references for the signing hot path.
  signing-certs:
    ttl-minutes: ${SIGNING_CERTS_CACHE_TTL_MINUTES:5}
    max-size: ${SIGNING_CERTS_CACHE_MAX_SIZE:1000}
  # Cryptographic Key Item cache caches keys and their associations to avoid repeated database lookups
  crypto-keys:
    ttl-minutes: ${CRYPTO_KEYS_CACHE_TTL_MINUTES:5}   # How long a cached key is considered valid
    max-size: ${CRYPTO_KEYS_CACHE_MAX_SIZE:10000}     # Maximum number of cached key items
  # TSP Profile cache caches TSP Profile by profile name for the timestamping hot path
  tsp-profiles:
    ttl-minutes: ${TSP_PROFILES_CACHE_TTL_MINUTES:5}   # How long a cached TSP profile is considered valid
    max-size: ${TSP_PROFILES_CACHE_MAX_SIZE:100}       # Maximum number of cached TSP profiles
  # Signing Profile cache caches SigningProfileModel by profile name for the signing/timestamping hot path
  signing-profiles:
    ttl-minutes: ${SIGNING_PROFILES_CACHE_TTL_MINUTES:5}   # How long a cached signing profile model is considered valid
    max-size: ${SIGNING_PROFILES_CACHE_MAX_SIZE:100}       # Maximum number of cached signing profile models
  # TQC cache caches TimeQualityConfigurationModel by UUID for the signing pipeline
  time-quality-configs:
    ttl-minutes: ${TQC_CACHE_TTL_MINUTES:5}   # How long a cached TQC model is considered valid
    max-size: ${TQC_CACHE_MAX_SIZE:50}        # Maximum number of cached TQC models

certificate:
  chain:
    max-depth: 20
  validation:
    batch-size: 10

# Authentication and authorization
auth-service:
  base-url: ${AUTH_SERVICE_BASE_URL}
opa:
  base-url: ${OPA_BASE_URL}

# CMP settings
cmp:
  protocol:
    poll:
      feature:
        timeout: 20
  verbose: false

# Discovery settings
discovery:
  provider:
    max-certificates-per-page: ${DISCOVERY_PROVIDER_MAX_CERTIFICATES_PER_PAGE:100}
    max-parallelism: ${DISCOVERY_PROVIDER_MAX_PARALLELISM:5}
    sleep-time-ms: ${DISCOVERY_PROVIDER_SLEEP_TIME_MS:5000}
    max-wait-time-seconds: ${DISCOVERY_PROVIDER_MAX_WAIT_TIME_SECONDS:21600}

hibernate:
  types:
    print:
      banner: false

info:
  app:
    name: ILM Core
    version: '@version@'

logging:
  level:
    com:
      otilm: ${PLATFORM_LOG_LEVEL:INFO}
  pattern:
    console: '[%d{yyyy-MM-dd HH:mm:ss.SSS}] %-5level [%t] [%logger - %line]: %m%n'
    file: '[%d{yyyy-MM-dd HH:mm:ss.SSS}] %-5level [%t] [%logger - %line]: %m%n'
  schema-version: '@log-schema.version@'

# Configuration of actuator
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      base-path: /v1/
      exposure:
        include: health,info
  info:
    env:
      enabled: true
    git:
      enabled: false

# OpenTelemetry settings
otel:
  exporter:
    otlp:
      logs:
        endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://localhost:4317}
        protocol: ${OTEL_EXPORTER_OTLP_LOGS_PROTOCOL:grpc}
      metrics:
        endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4317}
        protocol: ${OTEL_EXPORTER_OTLP_METRICS_PROTOCOL:grpc}
      traces:
        endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4317}
        protocol: ${OTEL_EXPORTER_OTLP_TRACES_PROTOCOL:grpc}
  logs:
    exporter: ${OTEL_LOGS_EXPORTER:none}
  metrics:
    exporter: ${OTEL_METRICS_EXPORTER:none}
  sdk:
    disabled: ${OTEL_SDK_DISABLED:true}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}

scheduled-tasks:
  enabled: ${SCHEDULED_TASKS_ENABLED:true}

scheduler:
  base-url: ${SCHEDULER_BASE_URL}

secrets:
  encryption:
    key: ${ENCRYPTION_KEY:J$-niT.PNp^?,wF<dB;E.W}

## Section server.* is related to the embedded Tomcat server only
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  ssl:
    # Client certificate HTTP header name
    certificate-header-enabled: ${HEADER_ENABLED}
    certificate-header-name: ${HEADER_NAME:ssl-client-cert}
    client-auth: want
    enabled: ${SSL_ENABLE:false}
    trust-store: ${TS_PATH}
    trust-store-password: ${TS_PASSWORD}
    trust-store-type: JKS

# Settings
settings:
  cache:
    refresh-interval: ${SETTINGS_CACHE_REFRESH_INTERVAL:30}

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      connectionTimeout: ${CONNECTION_POOL_CONNECTION_TIMEOUT:30000}
      idleTimeout: ${CONNECTION_POOL_IDLE_TIMEOUT:600000}
      maxLifetime: ${CONNECTION_POOL_MAX_LIFETIME:1800000}
      maximumPoolSize: ${CONNECTION_POOL_MAX_POOL_SIZE:40}
      schema: ${DB_SCHEMA:core}
    password: ${JDBC_PASSWORD}
    url: ${JDBC_URL}
    username: ${JDBC_USERNAME}
  flyway:
    out-of-order: true
    schemas: ${DB_SCHEMA:core}
    table: core_schema_history
  jpa:
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:core}
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
        type:
          preferred_duration_jdbc_type: INTERVAL_SECOND
  messaging:
    broker-type: ${BROKER_TYPE:RABBITMQ}  # RABBITMQ or SERVICEBUS
    broker-url: ${BROKER_URL:}
    # Legacy RabbitMQ connection properties (used if broker-url is not set)
    host: ${BROKER_HOST:}
    port: ${BROKER_PORT:5672}
    exchange: ${BROKER_EXCHANGE:ilm}
    # --- Authentication ---
    # For RabbitMQ: username/password required
    # For ServiceBus: either username/password (SAS) OR aad-auth (AAD) required
    username: ${BROKER_USERNAME:}
    password: ${BROKER_PASSWORD:}
    aad-auth: # Azure Active Directory (Entra) authentication for ServiceBus
      tenant-id: ${BROKER_AZURE_TENANT_ID:}
      client-id: ${BROKER_AZURE_CLIENT_ID:}
      client-secret: ${BROKER_AZURE_CLIENT_SECRET:}
      token-refresh-interval: ${BROKER_AZURE_TOKEN_REFRESH_INTERVAL:300} # seconds
      token-getting-timeout: ${BROKER_AZURE_TOKEN_GETTING_TIMEOUT:30} # seconds
    amqp-idle-timeout: ${BROKER_AMQP_IDLE_TIMEOUT:120000} # 2 min, AMQP transport-level heartbeat
    close-timeout: ${BROKER_CLOSE_TIMEOUT:2000} # ms, max time to wait for clean AMQP close handshake on connection failure
    pool:
      max-connections: ${BROKER_POOL_MAX_CONNECTIONS:5}
      connection-idle-timeout: ${BROKER_POOL_CONNECTION_IDLE_TIMEOUT:30000}
      connection-check-interval: ${BROKER_POOL_CONNECTION_CHECK_INTERVAL:60000}
      max-sessions-per-connection: ${BROKER_POOL_MAX_SESSIONS:500}
      use-anonymous-producers: ${BROKER_POOL_USE_ANONYMOUS_PRODUCERS:true}
    # --- RabbitMQ specific ---
    virtual-host: ${BROKER_VIRTUAL_HOST:}
    # --- Listener/Producer settings ---
    listener:
      initial-interval: ${BROKER_LISTENER_INITIAL_INTERVAL:5000}
      multiplier: ${BROKER_LISTENER_BACKOFF_MULTIPLIER:2.0}
      max-interval: ${BROKER_LISTENER_MAX_INTERVAL:120000}
    producer:
      retry:
        enabled: true
        initial-interval: 3000
        max-attempts: 3
        max-interval: 10000
        multiplier: 2
    # --- Queue names (RabbitMQ) / Subscription names (ServiceBus) ---
    queue:
      actions: ${BROKER_QUEUE_ACTIONS:core.actions}
      audit-logs: ${BROKER_QUEUE_AUDIT_LOGS:core.audit-logs}
      event: ${BROKER_QUEUE_EVENT:core.events}
      notification: ${BROKER_QUEUE_NOTIFICATION:core.notifications}
      scheduler: ${BROKER_QUEUE_SCHEDULER:core.scheduler}
      validation: ${BROKER_QUEUE_VALIDATION:core.validation}
      time-quality-config: ${BROKER_QUEUE_TIME_QUALITY_CONFIG:time-quality.config}
      time-quality-config-request: ${BROKER_QUEUE_TIME_QUALITY_CONFIG_REQUEST:time-quality.config-request}
      time-quality-results: ${BROKER_QUEUE_TIME_QUALITY_RESULTS:time-quality.results}
    routing-key:
      actions: ${BROKER_ROUTINGKEY_ACTIONS:action}
      audit-logs: ${BROKER_ROUTINGKEY_AUDIT_LOGS:audit-logs}
      event: ${BROKER_ROUTINGKEY_EVENT:event}
      notification: ${BROKER_ROUTINGKEY_NOTIFICATION:notification}
      scheduler: ${BROKER_ROUTINGKEY_SCHEDULER:scheduler}
      validation: ${BROKER_ROUTINGKEY_VALIDATION:validation}
      time-quality-config: ${BROKER_ROUTINGKEY_TIME_QUALITY_CONFIG:time-quality.config}
      time-quality-config-request: ${BROKER_ROUTINGKEY_TIME_QUALITY_CONFIG_REQUEST:time-quality.config-request}
      time-quality-results: ${BROKER_ROUTINGKEY_TIME_QUALITY_RESULTS:time-quality.results}
  threads:
    virtual:
      enabled: true
  transaction:
    default-timeout: 120

messaging:
  # Enables Core's messaging integration with the external Time Quality Monitor (TQM) service.
  time-quality:
    enabled: ${MESSAGING_TIME_QUALITY_ENABLED:false}
  concurrency:
    actions: 10
    events: 5
    notifications: 3
    scheduler: 10
    validation: 5
    audit-logs: 5
    time-quality-config-request: 5
    time-quality-results: 5

# Proxy configuration for connector communication via message queue
proxy:
  # Feature flag to enable/disable proxy messaging support
  enabled: ${PROXY_ENABLED:false}
  # Azure Service Bus topic / RabbitMQ exchange name for proxy messages
  exchange: ${BROKER_PROXY_EXCHANGE:ilm-proxy}
  # Azure Service Bus subscription / RabbitMQ queue name for receiving responses
  response-queue: ${BROKER_PROXY_RESPONSE_QUEUE:core}
  # Unique identifier for this Core instance (defaults to hostname/pod name)
  instance-id: ${PROXY_INSTANCE_ID:}
  # Maximum time to wait for a response from the proxy
  request-timeout: ${PROXY_REQUEST_TIMEOUT:30s}
  # Maximum number of concurrent pending requests (prevents memory exhaustion)
  max-pending-requests: ${PROXY_MAX_PENDING_REQUESTS:1000}

# Provisioning API client configuration
provisioning:
  api:
    url: ${PROVISIONING_API_URL}
    api-key: ${PROVISIONING_API_KEY}
    connect-timeout: ${PROVISIONING_CONNECT_TIMEOUT:500}
    read-timeout: ${PROVISIONING_READ_TIMEOUT:10s}
    installation-format: ${PROVISIONING_INSTALLATION_FORMAT:helm}
    retry:
      max-attempts: ${PROVISIONING_RETRY_MAX_ATTEMPTS:3}
      delay: ${PROVISIONING_RETRY_DELAY:1000}
      max-delay: ${PROVISIONING_RETRY_MAX_DELAY:5000}
      multiplier: ${PROVISIONING_RETRY_MULTIPLIER:2}

validation:
  crl:
    read-timeout: 2000
    connect-timeout: 1000
  ocsp:
    read-timeout: 1000
    connect-timeout: 1000

cbom:
  client:
    max-buffer-size: ${CBOM_CLIENT_MAX_BUFFER_SIZE:20971520}

signing-record:
  outbox:
    flush-interval-ms: ${SIGNING_RECORD_OUTBOX_FLUSH_INTERVAL_MS:500}
    max-batch-size: ${SIGNING_RECORD_OUTBOX_MAX_BATCH_SIZE:200}
    max-batches-per-run: ${SIGNING_RECORD_OUTBOX_MAX_BATCHES_PER_RUN:10}
    poison-threshold: ${SIGNING_RECORD_OUTBOX_POISON_THRESHOLD:10}
  best-effort:
    queue-capacity: ${SIGNING_RECORD_BEST_EFFORT_QUEUE_CAPACITY:10000}
    backpressure-policy: ${SIGNING_RECORD_BEST_EFFORT_BACKPRESSURE_POLICY:DROP_OLDEST}
    flush-interval-ms: ${SIGNING_RECORD_BEST_EFFORT_FLUSH_INTERVAL_MS:200}
    max-batch-size: ${SIGNING_RECORD_BEST_EFFORT_MAX_BATCH_SIZE:200}
  retention:
    sweep-interval-minutes: ${SIGNING_RECORD_RETENTION_SWEEP_INTERVAL_MINUTES:60}
    batch-size: ${SIGNING_RECORD_RETENTION_BATCH_SIZE:1000}
    max-batches-per-sweep: ${SIGNING_RECORD_RETENTION_MAX_BATCHES_PER_SWEEP:10}
  delete-after-retrieval:
    fallback-cron: ${SIGNING_RECORD_DELETE_AFTER_RETRIEVAL_CRON:0 0 3 * * *}
    batch-size: ${SIGNING_RECORD_DELETE_AFTER_RETRIEVAL_BATCH_SIZE:1000}
    max-batches-per-sweep: ${SIGNING_RECORD_DELETE_AFTER_RETRIEVAL_MAX_BATCHES_PER_SWEEP:10}
